name: Good First Issue
description: A well-scoped task for first-time contributors
labels: ["good first issue", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        This template is used by maintainers to create contributor-friendly issues.
        If you are a contributor looking for something to work on, browse
        [open good first issues](https://github.com/adaumsilva/RAG-framework/issues?q=is%3Aopen+is%3Aissue+label%3A%22good+first+issue%22).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be implemented?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this useful?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist — what must be true for this issue to be closed?
      placeholder: |
        - [ ] Class `XLoader` in `ragframework/document/loaders.py`
        - [ ] Subclasses `DocumentLoader` from `ragframework/base.py`
        - [ ] Raises `LoaderError` on failure
        - [ ] Unit tests in `tests/test_document/test_loaders.py`
        - [ ] Optional dep guarded with helpful import error
        - [ ] `CHANGELOG.md` updated
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Files to create or modify
      description: Which files should the contributor touch?

  - type: textarea
    id: resources
    attributes:
      label: Useful resources
      description: Links to relevant docs, libraries, or examples.

  - type: dropdown
    id: effort
    attributes:
      label: Estimated effort
      options:
        - Small (< 2 hours)
        - Medium (half day)
        - Large (1-2 days)
    validations:
      required: true
